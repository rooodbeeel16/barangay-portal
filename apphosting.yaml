# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

  # Override build and run commands (bypasses framework auto-detection).
scripts:
  buildCommand: cd backend && npm install && npm run build && npm prune --production
  runCommand: node backend/dist/index.js

# Include only required files in the deployed container.
outputFiles:
  serverApp:
    include: [ backend/dist, backend/node_modules, frontend ]

# Environment variables and secrets.
env:
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME
  - variable: FIREBASE_STORAGE_BUCKET
    value: barangay-portal-15469.firebasestorage.app
    availability:
      - RUNTIME
  - variable: FRONTEND_URL
    value: https://barangay-portal--barangay-portal-15469.asia-southeast1.hosted.app
    availability:
      - RUNTIME
  - variable: SMTP_HOST
    value: smtp.gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_PORT
    value: "587"
    availability:
      - RUNTIME
  - variable: SMTP_FROM
    value: barangaysiranganeast@gmail.com
    availability:
      - RUNTIME
  - variable: SMTP_USER
    secret: SMTP_USER
  - variable: SMTP_PASS
    secret: SMTP_PASS
