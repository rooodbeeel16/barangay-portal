<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/logo/sirangan-bg.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officials — Settings — Barangay Sirangan Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/shared.css">
  <link rel="stylesheet" href="/assets/admin.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <style>
    html, body { height: 100%; }
    .form-input { width:100%; padding:10px 14px; border-radius:12px; border:1.5px solid #e2e8f0; font-size:13px; color:#1e293b; background:#fafbfc; transition:border-color .15s, box-shadow .15s; outline:none; }
    .form-input:focus { border-color:#059669; box-shadow:0 0 0 3px rgba(5,150,105,.08); background:#fff; }
    .btn-save { display:inline-flex; align-items:center; gap:7px; background:#059669; color:#fff; padding:10px 22px; border-radius:12px; font-size:13px; font-weight:700; border:none; cursor:pointer; transition:background .15s, box-shadow .15s; }
    .btn-save:hover { background:#047857; box-shadow:0 4px 12px rgba(5,150,105,.3); }
    .btn-save:disabled { opacity:.6; cursor:not-allowed; }
    .anim-in { animation: fadeInUp 0.35s ease both; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside class="w-64 bg-[#0b1929] text-white flex flex-col flex-shrink-0 fixed h-full z-40" style="box-shadow:4px 0 24px rgba(0,0,0,.18)">
    <div class="px-5 py-5 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="relative flex-shrink-0">
          <img src="/assets/logo/sirangan-bg.png" alt="Logo" class="w-9 h-9 rounded-xl object-cover" style="box-shadow:0 0 0 2px rgba(251,191,36,.35)">
          <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-400 rounded-full border-2 border-[#0b1929] pulse-dot"></span>
        </div>
        <div>
          <div class="font-bold text-sm text-white leading-tight">Brgy. Sirangan</div>
          <div class="text-[10px] text-blue-300/70 font-medium tracking-wide uppercase mt-0.5">Admin Portal</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <p class="px-3 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">Main</p>
      <a href="/admin/dashboard.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span> Dashboard</a>
      <a href="/admin/requests.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-clipboard-list"></i></span> Requests</a>
      <a href="/admin/residents.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Residents</a>
      <a href="/admin/announcements.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-bullhorn"></i></span> Announcements</a>
      <a href="/admin/appointments.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-calendar-days"></i></span> Appointments</a>
      <a href="/admin/blotter.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-book"></i></span> Blotter</a>
      <p class="px-3 pt-4 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">System</p>
      <a href="/admin/audit-logs.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-pen-to-square"></i></span> Audit Logs</a>
      <a href="/admin/settings.html" class="nav-link active admin-only"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span> Settings</a>
    </nav>
    <div class="px-4 py-3.5 border-t border-white/10">
      <div class="flex items-center gap-2.5 px-1">
        <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] flex items-center justify-center text-xs font-bold text-white overflow-hidden flex-shrink-0" id="sidebarAvatar">?</div>
        <div class="min-w-0 flex-1">
          <div class="text-xs font-semibold text-white truncate" id="sidebarName">Loading…</div>
          <div class="text-[10px] text-white/35 mt-0.5" id="sidebarRole">—</div>
        </div>
        <button onclick="AuthService.logout()" title="Sign out" class="w-6 h-6 flex items-center justify-center text-white/30 hover:text-red-400 transition rounded"><i class="fa-solid fa-right-from-bracket text-xs"></i></button>
      </div>
    </div>
  </aside>
  <main class="ml-64 flex-1 overflow-y-auto flex flex-col min-h-screen bg-[#eef2f7]">
    <header class="bg-white/90 backdrop-blur-md border-b border-gray-200/80 px-8 py-4 sticky top-0 z-30 flex justify-between items-center" style="box-shadow:0 1px 12px rgba(30,58,95,.06)">
      <div class="flex items-center gap-3">
        <a href="/admin/settings.html" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition flex-shrink-0" title="Back to Settings">
          <i class="fa-solid fa-chevron-left text-xs"></i>
        </a>
        <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center flex-shrink-0" style="box-shadow:0 4px 12px rgba(5,150,105,.25)">
          <i class="fa-solid fa-users text-white text-sm"></i>
        </div>
        <div>
          <div class="flex items-center gap-1.5 text-[11px] text-gray-400 mb-0.5">
            <a href="/admin/settings.html" class="hover:text-gray-600 transition">Settings</a>
            <i class="fa-solid fa-chevron-right text-[9px]"></i>
            <span class="text-gray-600 font-semibold">Officials</span>
          </div>
          <h1 class="text-base font-bold text-gray-900 leading-tight">Barangay Officials</h1>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <div id="notifContainer"></div>
        <div class="relative" id="profileDropdown">
          <button onclick="toggleProfileDropdown()" class="flex items-center gap-2.5 rounded-xl px-2.5 py-1.5 hover:bg-gray-100 transition-all duration-150">
            <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] text-white flex items-center justify-center text-xs font-bold overflow-hidden flex-shrink-0" id="profileAvatar">?</div>
            <div class="text-left hidden sm:block">
              <div class="text-xs font-semibold text-gray-800 leading-tight" id="profileName"></div>
              <div class="text-[10px] text-gray-400" id="profileRoleTag"></div>
            </div>
            <i class="fa-solid fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200" id="profileChevron"></i>
          </button>
          <div id="profileMenu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-2xl py-2 z-50" style="box-shadow:0 16px 40px -8px rgba(0,0,0,.18);border:1px solid rgba(0,0,0,.07)">
            <div class="px-4 py-2.5 border-b border-gray-50 mb-1">
              <div class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold">Signed in as</div>
              <div class="text-xs font-semibold text-gray-800 truncate mt-0.5" id="profileMenuEmail"></div>
            </div>
            <a href="/admin/settings.html" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-amber-600 bg-amber-50 font-semibold hover:bg-amber-100 rounded-lg transition"><i class="fa-solid fa-gear w-4 text-amber-400 text-xs"></i> Settings</a>
            <a href="/index.html" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition"><i class="fa-solid fa-house w-4 text-gray-400 text-xs"></i> Barangay Portal</a>
            <div class="border-t border-gray-50 my-1.5"></div>
            <button onclick="AuthService.logout()" class="w-full flex items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition"><i class="fa-solid fa-right-from-bracket w-4 text-xs"></i> Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <div class="flex-1 flex justify-center py-8 px-8 pb-16">
      <div class="w-full max-w-4xl anim-in">
        <div class="bg-white rounded-2xl border border-gray-100 p-7" style="box-shadow:0 2px 12px rgba(30,58,95,.06)">

          <!-- Key Officials -->
          <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Key Officials</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6" id="keyOfficialsGrid">
            <div class="skeleton h-24 rounded-2xl"></div>
            <div class="skeleton h-24 rounded-2xl"></div>
            <div class="skeleton h-24 rounded-2xl"></div>
            <div class="skeleton h-24 rounded-2xl"></div>
          </div>

          <!-- Barangay Kagawads -->
          <div class="mt-4">
            <div class="flex items-center justify-between mb-3">
              <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Barangay Kagawads</p>
              <button onclick="addMember('kagawads')" class="text-xs bg-[#1e3a5f] text-white px-3 py-1.5 rounded-lg hover:bg-blue-800 transition font-semibold flex items-center gap-1.5"><i class="fa-solid fa-plus text-[10px]"></i> Add Member</button>
            </div>
            <div id="kagawadsList" class="space-y-2"></div>
          </div>

          <!-- SK Kagawads -->
          <div class="mt-6">
            <div class="flex items-center justify-between mb-3">
              <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">SK Kagawads</p>
              <button onclick="addMember('skKagawads')" class="text-xs bg-[#1e3a5f] text-white px-3 py-1.5 rounded-lg hover:bg-blue-800 transition font-semibold flex items-center gap-1.5"><i class="fa-solid fa-plus text-[10px]"></i> Add Member</button>
            </div>
            <div id="skKagawadsList" class="space-y-2"></div>
          </div>

          <div id="officialsSuccess" class="hidden mt-4 px-4 py-3 bg-green-50 text-green-700 border border-green-200 rounded-xl text-sm font-medium"></div>
          <div id="officialsError" class="hidden mt-4 px-4 py-3 bg-red-50 text-red-700 border border-red-200 rounded-xl text-sm font-medium"></div>
          <div class="mt-6 flex justify-end">
            <button onclick="saveOfficials()" id="saveOfficialsBtn" class="btn-save"><i class="fa-solid fa-floppy-disk text-xs"></i> Save Officials</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script>
  function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function cap(str) { return str ? str.charAt(0).toUpperCase()+str.slice(1) : ''; }

  function toggleProfileDropdown() {
    var menu = document.getElementById('profileMenu');
    var chevron = document.getElementById('profileChevron');
    var isHidden = menu.classList.toggle('hidden');
    chevron.style.transform = isHidden ? '' : 'rotate(180deg)';
  }
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('profileDropdown');
    if (dd && !dd.contains(e.target)) {
      document.getElementById('profileMenu').classList.add('hidden');
      document.getElementById('profileChevron').style.transform = '';
    }
  });

  function renderProfileHeader(userData) {
    var avatarEl = document.getElementById('profileAvatar');
    var nameEl = document.getElementById('profileName');
    var roleTagEl = document.getElementById('profileRoleTag');
    var menuEmailEl = document.getElementById('profileMenuEmail');
    if (nameEl) nameEl.textContent = userData.name || userData.email || '';
    if (roleTagEl) roleTagEl.textContent = cap(userData.role || '');
    if (menuEmailEl) menuEmailEl.textContent = userData.email || '';
    if (avatarEl) {
      if (userData.photoUrl) { avatarEl.innerHTML = '<img src="' + escHtml(userData.photoUrl) + '" class="w-full h-full object-cover" alt="">'; }
      else { avatarEl.textContent = (userData.name||'?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?'; }
    }
    var sa = document.getElementById('sidebarAvatar');
    if (sa) {
      if (userData.photoUrl) { sa.innerHTML = '<img src="' + escHtml(userData.photoUrl) + '" class="w-full h-full object-cover rounded-lg" alt="">'; }
      else { sa.textContent = (userData.name||'?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?'; }
    }
    var sn = document.getElementById('sidebarName'); if (sn) sn.textContent = userData.name || '';
    var sr = document.getElementById('sidebarRole'); if (sr) sr.textContent = cap(userData.role || '');
  }

  var currentUser = {};
  var configData = {};

  var DEFAULT_OFFICIALS = {
    captain:   { name: 'Hon. Maria L. Santos',      imageUrl: '' },
    secretary: { name: 'Ms. Angela P. Reyes',        imageUrl: '' },
    treasurer: { name: 'Mr. Daniel R. Villanueva',   imageUrl: '' },
    skChair:   { name: 'Hon. Kyle M. Fernandez',     imageUrl: '' },
    kagawads: [
      { name: 'Hon. Ricardo T. Mendoza',  imageUrl: '' },
      { name: 'Hon. Liza M. Dela Cruz',   imageUrl: '' },
      { name: 'Hon. Joseph A. Domingo',   imageUrl: '' },
      { name: 'Hon. Marlon G. Bautista',  imageUrl: '' },
      { name: 'Hon. Joy P. Ramirez',      imageUrl: '' },
      { name: 'Hon. Ernesto L. Castillo', imageUrl: '' },
      { name: 'Hon. Clarissa B. Navarro', imageUrl: '' }
    ],
    skKagawads: [
      { name: 'SK John A. Mercado',      imageUrl: '' },
      { name: 'SK Maria C. Lopez',       imageUrl: '' },
      { name: 'SK Patrick D. Flores',    imageUrl: '' },
      { name: 'SK Angelica R. Cruz',     imageUrl: '' },
      { name: 'SK Mark S. Gonzales',     imageUrl: '' },
      { name: 'SK Janelle P. Ramos',     imageUrl: '' },
      { name: 'SK Nathaniel B. Santos',  imageUrl: '' }
    ]
  };

  var KEY_OFFICIALS_META = [
    { key: 'captain',   label: 'Barangay Captain' },
    { key: 'secretary', label: 'Barangay Secretary' },
    { key: 'treasurer', label: 'Barangay Treasurer' },
    { key: 'skChair',   label: 'SK Chairperson' }
  ];

  var officialsData = JSON.parse(JSON.stringify(DEFAULT_OFFICIALS));

  firebase.auth().onAuthStateChanged(async function(fbUser) {
    if (!fbUser) { window.location.href = '/admin/login.html'; return; }
    try {
      var freshToken = await fbUser.getIdToken(true);
      var idTokenResult = await fbUser.getIdTokenResult();
      var storedUser = JSON.parse(localStorage.getItem('user') || '{}');
      currentUser = { uid: fbUser.uid, email: fbUser.email, name: fbUser.displayName || storedUser.name || '', role: idTokenResult.claims.role || 'staff', photoUrl: fbUser.photoURL || storedUser.photoUrl || '' };
      if (currentUser.role === 'staff') { window.location.href = '/admin/dashboard.html'; return; }
      localStorage.setItem('authToken', freshToken);
      localStorage.setItem('user', JSON.stringify(currentUser));
      renderProfileHeader(currentUser);
      loadOfficials();
    } catch(e) { window.location.href = '/admin/login.html'; }
  });

  async function loadOfficials() {
    try {
      var data = await get('/config');
      configData = data;
      var saved = data.officials;
      if (saved) {
        officialsData = {
          captain:    Object.assign({}, DEFAULT_OFFICIALS.captain,   saved.captain   || {}),
          secretary:  Object.assign({}, DEFAULT_OFFICIALS.secretary, saved.secretary || {}),
          treasurer:  Object.assign({}, DEFAULT_OFFICIALS.treasurer, saved.treasurer || {}),
          skChair:    Object.assign({}, DEFAULT_OFFICIALS.skChair,   saved.skChair   || {}),
          kagawads:   saved.kagawads   || JSON.parse(JSON.stringify(DEFAULT_OFFICIALS.kagawads)),
          skKagawads: saved.skKagawads || JSON.parse(JSON.stringify(DEFAULT_OFFICIALS.skKagawads))
        };
      }
      renderKeyOfficials();
      renderMemberList('kagawads',   'kagawadsList');
      renderMemberList('skKagawads', 'skKagawadsList');
    } catch(e) {
      Utils.showToast('Failed to load officials', 'error');
    }
  }

  function renderKeyOfficials() {
    var grid = document.getElementById('keyOfficialsGrid');
    if (!grid) return;
    grid.innerHTML = KEY_OFFICIALS_META.map(function(o) {
      var off = officialsData[o.key] || {};
      var imgHtml = off.imageUrl
        ? '<img src="' + escHtml(off.imageUrl) + '" class="w-full h-full object-cover" alt="">'
        : '<i class="fa-solid fa-user text-slate-400 text-2xl"></i>';
      var removeBtn = off.imageUrl
        ? '<button type="button" onclick="removeOfficialImage(\'' + o.key + '\')" class="flex items-center gap-1.5 text-xs text-red-500 font-semibold hover:text-red-700 ml-3" title="Remove photo"><i class="fa-solid fa-xmark"></i> Remove</button>'
        : '';
      return '<div class="border border-gray-200 rounded-2xl p-4">' +
        '<div class="flex items-center gap-3 mb-3">' +
        '<div class="w-14 h-14 rounded-full bg-slate-100 border border-slate-200 overflow-hidden flex-shrink-0 flex items-center justify-center" id="official_' + o.key + '_preview">' + imgHtml + '</div>' +
        '<div class="flex-1 min-w-0">' +
        '<div class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">' + escHtml(o.label) + '</div>' +
        '<input type="text" id="official_' + o.key + '_name" value="' + escHtml(off.name || '') + '" placeholder="Full name" class="form-input">' +
        '</div></div>' +
        '<div class="flex items-center gap-0">' +
        '<label class="flex items-center gap-2 cursor-pointer text-xs text-[#1e3a5f] font-semibold hover:underline">' +
        '<input type="file" class="hidden" accept="image/jpeg,image/png,image/jpg" onchange="handleOfficialImageUpload(\'' + o.key + '\',this)">' +
        '<i class="fa-solid fa-camera"></i> Upload Photo</label>' +
        removeBtn +
        '</div>' +
        '</div>';
    }).join('');
  }

  async function handleOfficialImageUpload(key, input) {
    if (!input.files || !input.files[0]) return;
    var formData = new FormData();
    formData.append('file', input.files[0]);
    try {
      Utils.showToast('Uploading…', 'info');
      var result = await uploadFile('/uploads/official-image', formData);
      if (!officialsData[key]) officialsData[key] = {};
      officialsData[key].imageUrl = result.url;
      var preview = document.getElementById('official_' + key + '_preview');
      if (preview) preview.innerHTML = '<img src="' + escHtml(result.url) + '" class="w-full h-full object-cover" alt="">';
      Utils.showToast('Image uploaded', 'success');
    } catch(e) {
      Utils.showToast('Upload failed: ' + e.message, 'error');
    } finally { input.value = ''; }
  }

  function renderMemberList(listKey, containerId) {
    var list = officialsData[listKey] || [];
    var container = document.getElementById(containerId);
    if (!container) return;
    if (!list.length) {
      container.innerHTML = '<div class="text-sm text-gray-400 py-2">No members. Click "+ Add Member" to add.</div>';
      return;
    }
    container.innerHTML = list.map(function(m, i) {
      var imgHtml = m.imageUrl
        ? '<img src="' + escHtml(m.imageUrl) + '" class="w-full h-full object-cover" alt="">'
        : '<i class="fa-solid fa-user text-gray-400 text-base"></i>';
      var removeImgBtn = m.imageUrl
        ? '<button type="button" onclick="removeMemberImage(\'' + listKey + '\',' + i + ')" class="p-1.5 text-red-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition flex-shrink-0" title="Remove photo"><i class="fa-solid fa-image-slash text-xs"></i></button>'
        : '';
      return '<div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">' +
        '<div class="relative flex-shrink-0 group">' +
          '<div class="w-11 h-11 rounded-full bg-gray-200 overflow-hidden flex items-center justify-center border-2 border-white shadow-sm" id="' + listKey + '_prev_' + i + '">' + imgHtml + '</div>' +
          '<label for="' + listKey + '_fi_' + i + '" class="absolute inset-0 flex items-center justify-center rounded-full bg-black/40 opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity" title="Upload photo"><i class="fa-solid fa-camera text-white text-xs"></i></label>' +
          '<input type="file" id="' + listKey + '_fi_' + i + '" class="hidden" accept="image/jpeg,image/png,image/jpg" onchange="handleMemberImageUpload(\'' + listKey + '\',' + i + ',this)">' +
        '</div>' +
        '<input type="text" value="' + escHtml(m.name || '') + '" oninput="updateMemberName(\'' + listKey + '\',' + i + ',this.value)" class="form-input flex-1" placeholder="Name">' +
        removeImgBtn +
        '<button onclick="removeMember(\'' + listKey + '\',' + i + ')" class="p-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition flex-shrink-0" title="Remove"><i class="fa-solid fa-trash text-xs"></i></button>' +
        '</div>';
    }).join('');
  }

  function removeOfficialImage(key) {
    if (!officialsData[key]) return;
    // sync any unsaved name edits from DOM before re-rendering
    KEY_OFFICIALS_META.forEach(function(o) {
      var nameEl = document.getElementById('official_' + o.key + '_name');
      if (nameEl && officialsData[o.key]) officialsData[o.key].name = nameEl.value;
    });
    officialsData[key].imageUrl = '';
    renderKeyOfficials();
  }

  function removeMemberImage(listKey, index) {
    if (officialsData[listKey] && officialsData[listKey][index] !== undefined) {
      officialsData[listKey][index].imageUrl = '';
    }
    renderMemberList(listKey, listKey + 'sList');
  }

  function updateMemberName(listKey, index, value) {
    if (officialsData[listKey] && officialsData[listKey][index] !== undefined) {
      officialsData[listKey][index].name = value;
    }
  }

  async function handleMemberImageUpload(listKey, index, input) {
    if (!input.files || !input.files[0]) return;
    var formData = new FormData();
    formData.append('file', input.files[0]);
    try {
      Utils.showToast('Uploading…', 'info');
      var result = await uploadFile('/uploads/official-image', formData);
      if (officialsData[listKey] && officialsData[listKey][index] !== undefined) {
        officialsData[listKey][index].imageUrl = result.url;
      }
      var preview = document.getElementById(listKey + '_prev_' + index);
      if (preview) preview.innerHTML = '<img src="' + escHtml(result.url) + '" class="w-full h-full object-cover" alt="" style="border-radius:50%">';
      Utils.showToast('Image uploaded', 'success');
    } catch(e) {
      Utils.showToast('Upload failed: ' + e.message, 'error');
    } finally { input.value = ''; }
  }

  function removeMember(listKey, index) {
    officialsData[listKey] = officialsData[listKey].filter(function(_, i) { return i !== index; });
    renderMemberList(listKey, listKey + 'sList');
  }

  function addMember(listKey) {
    if (!officialsData[listKey]) officialsData[listKey] = [];
    officialsData[listKey].push({ name: '', imageUrl: '' });
    renderMemberList(listKey, listKey + 'sList');
    var container = document.getElementById(listKey + 'sList');
    if (container) {
      var rows = container.querySelectorAll('.flex.items-center.gap-3');
      var lastRow = rows[rows.length - 1];
      if (lastRow) {
        var textInput = lastRow.querySelector('input[type="text"]');
        if (textInput) textInput.focus();
        lastRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }

  async function saveOfficials() {
    KEY_OFFICIALS_META.forEach(function(o) {
      var nameEl = document.getElementById('official_' + o.key + '_name');
      if (nameEl) {
        if (!officialsData[o.key]) officialsData[o.key] = {};
        officialsData[o.key].name = nameEl.value.trim();
      }
    });
    var btn = document.getElementById('saveOfficialsBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> Saving...';
    document.getElementById('officialsSuccess').classList.add('hidden');
    document.getElementById('officialsError').classList.add('hidden');
    try {
      await put('/config', Object.assign({}, configData, { officials: officialsData }));
      configData.officials = officialsData;
      document.getElementById('officialsSuccess').textContent = 'Officials saved successfully!';
      document.getElementById('officialsSuccess').classList.remove('hidden');
      setTimeout(function() { document.getElementById('officialsSuccess').classList.add('hidden'); }, 3000);
    } catch(e) {
      document.getElementById('officialsError').textContent = 'Failed: ' + e.message;
      document.getElementById('officialsError').classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk text-xs"></i> Save Officials';
    }
  }
</script>
</body>
</html>
