<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/logo/sirangan-bg.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holidays &amp; Closures — Settings — Barangay Sirangan Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/shared.css">
  <link rel="stylesheet" href="/assets/admin.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <style>
    html, body { height: 100%; }
    .btn-primary { display:inline-flex; align-items:center; gap:7px; background:#d97706; color:#fff; padding:10px 22px; border-radius:12px; font-size:13px; font-weight:700; border:none; cursor:pointer; transition:background .15s, box-shadow .15s; }
    .btn-primary:hover { background:#b45309; box-shadow:0 4px 12px rgba(217,119,6,.3); }
    .anim-in { animation: fadeInUp 0.35s ease both; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    /* Modal */
    #addModal { display:none; position:fixed; inset:0; z-index:50; background:rgba(10,22,40,.5); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:1rem; opacity:0; transition:opacity .2s ease; }
    #addModal.is-open { display:flex; }
    #addModal.is-visible { opacity:1; }
    .modal-panel { background:#fff; border-radius:20px; width:100%; max-width:420px; transform:scale(.95) translateY(14px); opacity:0; transition:transform .28s cubic-bezier(.34,1.26,.64,1), opacity .2s ease; box-shadow:0 24px 64px -12px rgba(0,0,0,.28); }
    #addModal.is-visible .modal-panel { transform:scale(1) translateY(0); opacity:1; }
    .form-input { width:100%; padding:10px 14px; border-radius:12px; border:1.5px solid #e2e8f0; font-size:13px; color:#1e293b; background:#fafbfc; transition:border-color .15s, box-shadow .15s; outline:none; }
    .form-input:focus { border-color:#d97706; box-shadow:0 0 0 3px rgba(217,119,6,.08); background:#fff; }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside class="w-64 bg-[#0b1929] text-white flex flex-col flex-shrink-0 fixed h-full z-40" style="box-shadow:4px 0 24px rgba(0,0,0,.18)">
    <div class="px-5 py-5 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="relative flex-shrink-0">
          <img src="/assets/logo/sirangan-bg.png" alt="Logo" class="w-9 h-9 rounded-xl object-cover" style="box-shadow:0 0 0 2px rgba(251,191,36,.35)">
          <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-400 rounded-full border-2 border-[#0b1929] pulse-dot"></span>
        </div>
        <div>
          <div class="font-bold text-sm text-white leading-tight">Brgy. Sirangan</div>
          <div class="text-[10px] text-blue-300/70 font-medium tracking-wide uppercase mt-0.5">Admin Portal</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <p class="px-3 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">Main</p>
      <a href="/admin/dashboard.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span> Dashboard</a>
      <a href="/admin/requests.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-clipboard-list"></i></span> Requests</a>
      <a href="/admin/residents.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Residents</a>
      <a href="/admin/announcements.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-bullhorn"></i></span> Announcements</a>
      <a href="/admin/appointments.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-calendar-days"></i></span> Appointments</a>
      <a href="/admin/blotter.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-book"></i></span> Blotter</a>
      <p class="px-3 pt-4 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">System</p>
      <a href="/admin/audit-logs.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-pen-to-square"></i></span> Audit Logs</a>
      <a href="/admin/settings.html" class="nav-link active"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span> Settings</a>
    </nav>
    <div class="px-4 py-3.5 border-t border-white/10">
      <div class="flex items-center gap-2.5 px-1">
        <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] flex items-center justify-center text-xs font-bold text-white overflow-hidden flex-shrink-0" id="sidebarAvatar">?</div>
        <div class="min-w-0 flex-1">
          <div class="text-xs font-semibold text-white truncate" id="sidebarName">Loading…</div>
          <div class="text-[10px] text-white/35 mt-0.5" id="sidebarRole">—</div>
        </div>
        <button onclick="AuthService.logout()" title="Sign out" class="w-6 h-6 flex items-center justify-center text-white/30 hover:text-red-400 transition rounded"><i class="fa-solid fa-right-from-bracket text-xs"></i></button>
      </div>
    </div>
  </aside>
  <main class="ml-64 flex-1 overflow-y-auto flex flex-col min-h-screen bg-[#eef2f7]">
    <header class="bg-white/90 backdrop-blur-md border-b border-gray-200/80 px-8 py-4 sticky top-0 z-30 flex justify-between items-center" style="box-shadow:0 1px 12px rgba(30,58,95,.06)">
      <div class="flex items-center gap-3">
        <a href="/admin/settings.html" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition flex-shrink-0" title="Back to Settings">
          <i class="fa-solid fa-chevron-left text-xs"></i>
        </a>
        <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-amber-500 to-amber-600 flex items-center justify-center flex-shrink-0" style="box-shadow:0 4px 12px rgba(217,119,6,.25)">
          <i class="fa-solid fa-calendar-days text-white text-sm"></i>
        </div>
        <div>
          <div class="flex items-center gap-1.5 text-[11px] text-gray-400 mb-0.5">
            <a href="/admin/settings.html" class="hover:text-gray-600 transition">Settings</a>
            <i class="fa-solid fa-chevron-right text-[9px]"></i>
            <span class="text-gray-600 font-semibold">Holidays &amp; Closures</span>
          </div>
          <h1 class="text-base font-bold text-gray-900 leading-tight">Office Closure / Holiday Dates</h1>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="openAddModal()" class="btn-primary text-xs px-4 py-2" style="padding:8px 16px;border-radius:10px">
          <i class="fa-solid fa-plus text-[10px]"></i> Add Date
        </button>
        <div id="notifContainer"></div>
        <div class="relative" id="profileDropdown">
          <button onclick="toggleProfileDropdown()" class="flex items-center gap-2.5 rounded-xl px-2.5 py-1.5 hover:bg-gray-100 transition-all duration-150">
            <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] text-white flex items-center justify-center text-xs font-bold overflow-hidden flex-shrink-0" id="profileAvatar">?</div>
            <div class="text-left hidden sm:block">
              <div class="text-xs font-semibold text-gray-800 leading-tight" id="profileName"></div>
              <div class="text-[10px] text-gray-400" id="profileRoleTag"></div>
            </div>
            <i class="fa-solid fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200" id="profileChevron"></i>
          </button>
          <div id="profileMenu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-2xl py-2 z-50" style="box-shadow:0 16px 40px -8px rgba(0,0,0,.18);border:1px solid rgba(0,0,0,.07)">
            <div class="px-4 py-2.5 border-b border-gray-50 mb-1">
              <div class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold">Signed in as</div>
              <div class="text-xs font-semibold text-gray-800 truncate mt-0.5" id="profileMenuEmail"></div>
            </div>
            <a href="/admin/settings.html" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-amber-600 bg-amber-50 font-semibold hover:bg-amber-100 rounded-lg transition"><i class="fa-solid fa-gear w-4 text-amber-400 text-xs"></i> Settings</a>
            <a href="/index.html" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition"><i class="fa-solid fa-house w-4 text-gray-400 text-xs"></i> Barangay Portal</a>
            <div class="border-t border-gray-50 my-1.5"></div>
            <button onclick="AuthService.logout()" class="w-full flex items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition"><i class="fa-solid fa-right-from-bracket w-4 text-xs"></i> Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <div class="flex-1 flex justify-center py-8 px-8 pb-16">
      <div class="w-full max-w-2xl anim-in">
        <div class="bg-white rounded-2xl border border-gray-100 p-7" style="box-shadow:0 2px 12px rgba(30,58,95,.06)">
          <div id="holidayList" class="space-y-2">
            <div class="flex items-center gap-2 py-4 text-sm text-gray-400">
              <i class="fa-solid fa-spinner fa-spin text-xs"></i> Loading...
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Holiday Modal -->
<div id="addModal">
  <div class="modal-panel p-7">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-sm font-bold text-gray-800">Add Closure / Holiday Date</h3>
      <button onclick="closeAddModal()" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 transition"><i class="fa-solid fa-xmark text-xs"></i></button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Date <span class="text-red-500">*</span></label>
        <input type="date" id="modalDate" class="form-input">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Reason <span class="text-gray-400 font-normal normal-case">(optional)</span></label>
        <input type="text" id="modalReason" class="form-input" placeholder="e.g. National Holiday, Office Renovation...">
      </div>
    </div>
    <div id="modalError" class="hidden mt-3 px-3 py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg text-xs font-medium"></div>
    <div class="mt-5 flex justify-end gap-3">
      <button onclick="closeAddModal()" class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-xl font-semibold transition">Cancel</button>
      <button onclick="confirmAddHoliday()" id="modalSaveBtn" class="btn-primary text-xs" style="padding:9px 18px;border-radius:10px"><i class="fa-solid fa-plus text-[10px]"></i> Add Date</button>
    </div>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script>
  function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function cap(str) { return str ? str.charAt(0).toUpperCase()+str.slice(1) : ''; }

  function toggleProfileDropdown() {
    var menu = document.getElementById('profileMenu');
    var chevron = document.getElementById('profileChevron');
    var isHidden = menu.classList.toggle('hidden');
    chevron.style.transform = isHidden ? '' : 'rotate(180deg)';
  }
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('profileDropdown');
    if (dd && !dd.contains(e.target)) {
      document.getElementById('profileMenu').classList.add('hidden');
      document.getElementById('profileChevron').style.transform = '';
    }
  });

  function renderProfileHeader(userData) {
    var avatarEl = document.getElementById('profileAvatar');
    var nameEl = document.getElementById('profileName');
    var roleTagEl = document.getElementById('profileRoleTag');
    var menuEmailEl = document.getElementById('profileMenuEmail');
    if (nameEl) nameEl.textContent = userData.name || userData.email || '';
    if (roleTagEl) roleTagEl.textContent = cap(userData.role || '');
    if (menuEmailEl) menuEmailEl.textContent = userData.email || '';
    if (avatarEl) {
      if (userData.photoUrl) { avatarEl.innerHTML = '<img src="' + escHtml(userData.photoUrl) + '" class="w-full h-full object-cover" alt="">'; }
      else { avatarEl.textContent = (userData.name||'?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?'; }
    }
    var sa = document.getElementById('sidebarAvatar');
    if (sa) {
      if (userData.photoUrl) { sa.innerHTML = '<img src="' + escHtml(userData.photoUrl) + '" class="w-full h-full object-cover rounded-lg" alt="">'; }
      else { sa.textContent = (userData.name||'?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?'; }
    }
    var sn = document.getElementById('sidebarName'); if (sn) sn.textContent = userData.name || '';
    var sr = document.getElementById('sidebarRole'); if (sr) sr.textContent = cap(userData.role || '');
  }

  var currentUser = {};
  var configData = {};

  firebase.auth().onAuthStateChanged(async function(fbUser) {
    if (!fbUser) { window.location.href = '/admin/login.html'; return; }
    try {
      var freshToken = await fbUser.getIdToken(true);
      var idTokenResult = await fbUser.getIdTokenResult();
      var storedUser = JSON.parse(localStorage.getItem('user') || '{}');
      currentUser = { uid: fbUser.uid, email: fbUser.email, name: fbUser.displayName || storedUser.name || '', role: idTokenResult.claims.role || 'staff', photoUrl: fbUser.photoURL || storedUser.photoUrl || '' };
      localStorage.setItem('authToken', freshToken);
      localStorage.setItem('user', JSON.stringify(currentUser));
      renderProfileHeader(currentUser);
      loadHolidays();
    } catch(e) { window.location.href = '/admin/login.html'; }
  });

  async function loadHolidays() {
    try {
      var data = await get('/config');
      configData = data;
      renderHolidays(data.closureDates || data.holidays || []);
    } catch(e) {
      document.getElementById('holidayList').innerHTML = '<div class="text-sm text-red-400">Failed to load.</div>';
    }
  }

  function renderHolidays(dates) {
    configData.closureDates = dates;
    var el = document.getElementById('holidayList');
    if (!dates.length) {
      el.innerHTML = '<div class="flex flex-col items-center justify-center py-10 text-gray-400"><i class="fa-solid fa-calendar-xmark text-2xl mb-3"></i><p class="text-sm">No closure dates set.</p><p class="text-xs mt-1">Click "Add Date" to add one.</p></div>';
      return;
    }
    el.innerHTML = dates.map(function(d, i) {
      var dateStr = d.date || d;
      var formatted = '';
      try {
        var parts = dateStr.split('-');
        var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
        formatted = dt.toLocaleDateString('en-PH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      } catch(_) { formatted = dateStr; }
      return '<div class="flex items-center gap-4 bg-amber-50 border border-amber-100 rounded-xl px-4 py-3">' +
        '<div class="w-9 h-9 rounded-xl bg-amber-100 flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-calendar-day text-amber-600 text-sm"></i></div>' +
        '<div class="flex-1 min-w-0">' +
          '<div class="text-sm font-semibold text-gray-800">' + escHtml(formatted) + '</div>' +
          (d.reason ? '<div class="text-xs text-gray-500 mt-0.5">' + escHtml(d.reason) + '</div>' : '') +
        '</div>' +
        '<button onclick="removeHoliday(' + i + ')" class="p-1.5 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition flex-shrink-0" title="Remove"><i class="fa-solid fa-trash text-xs"></i></button>' +
        '</div>';
    }).join('');
  }

  function openAddModal() {
    document.getElementById('modalDate').value = '';
    document.getElementById('modalReason').value = '';
    document.getElementById('modalError').classList.add('hidden');
    var m = document.getElementById('addModal');
    m.classList.add('is-open');
    requestAnimationFrame(function() { m.classList.add('is-visible'); });
  }

  function closeAddModal() {
    var m = document.getElementById('addModal');
    m.classList.remove('is-visible');
    setTimeout(function() { m.classList.remove('is-open'); }, 220);
  }

  document.getElementById('addModal').addEventListener('click', function(e) {
    if (e.target === this) closeAddModal();
  });

  async function confirmAddHoliday() {
    var date = document.getElementById('modalDate').value;
    var reason = document.getElementById('modalReason').value.trim();
    document.getElementById('modalError').classList.add('hidden');
    if (!date) {
      document.getElementById('modalError').textContent = 'Please select a date.';
      document.getElementById('modalError').classList.remove('hidden'); return;
    }
    var btn = document.getElementById('modalSaveBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[10px]"></i> Adding...';
    var dates = (configData.closureDates || []).concat([{ date: date, reason: reason }]);
    try {
      await put('/config', Object.assign({}, configData, { closureDates: dates }));
      configData.closureDates = dates;
      renderHolidays(dates);
      closeAddModal();
      Utils.showToast('Closure date added', 'success');
    } catch(e) {
      document.getElementById('modalError').textContent = 'Failed: ' + e.message;
      document.getElementById('modalError').classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-plus text-[10px]"></i> Add Date';
    }
  }

  async function removeHoliday(i) {
    var dates = (configData.closureDates || []).filter(function(_, idx) { return idx !== i; });
    try {
      await put('/config', Object.assign({}, configData, { closureDates: dates }));
      configData.closureDates = dates;
      renderHolidays(dates);
      Utils.showToast('Closure date removed', 'success');
    } catch(e) {
      Utils.showToast('Failed: ' + e.message, 'error');
    }
  }
</script>
</body>
</html>
