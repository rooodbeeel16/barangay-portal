  <link rel="stylesheet" href="/assets/shared.css">
  <link rel="stylesheet" href="/assets/admin.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    /* Page-specific overrides — shared styles in admin.css */
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside class="w-64 bg-[#0b1929] text-white flex flex-col flex-shrink-0 fixed h-full z-40" style="box-shadow:4px 0 24px rgba(0,0,0,.18)">
    <div class="px-5 py-5 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="relative flex-shrink-0">
          <img src="/assets/logo/sirangan-bg.png" alt="Logo" class="w-9 h-9 rounded-xl object-cover" style="box-shadow:0 0 0 2px rgba(251,191,36,.35)">
          <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-400 rounded-full border-2 border-[#0b1929] pulse-dot"></span>
        </div>
        <div>
          <div class="font-bold text-sm text-white leading-tight">Brgy. Sirangan</div>
          <div class="text-[10px] text-blue-300/70 font-medium tracking-wide uppercase mt-0.5">Admin Portal</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <p class="px-3 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">Main</p>
      <a href="/admin/dashboard.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span> Dashboard</a>
      <a href="/admin/requests.html" class="nav-link active"><span class="nav-icon"><i class="fa-solid fa-clipboard-list"></i></span> Requests</a>
      <a href="/admin/residents.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Residents</a>
      <a href="/admin/announcements.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-bullhorn"></i></span> Announcements</a>
      <a href="/admin/appointments.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-calendar-days"></i></span> Appointments</a>
      <a href="/admin/blotter.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-book"></i></span> Blotter</a>
      <p class="px-3 pt-4 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">System</p>
      <a href="/admin/audit-logs.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-pen-to-square"></i></span> Audit Logs</a>
      <a href="/admin/settings.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span> Settings</a>
    </nav>
    <div class="px-4 py-3.5 border-t border-white/10">
      <div class="flex items-center gap-2.5 px-1">
        <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] flex items-center justify-center text-xs font-bold text-white overflow-hidden flex-shrink-0" id="sidebarAvatar">?</div>
        <div class="min-w-0 flex-1">
          <div class="text-xs font-semibold text-white truncate" id="sidebarName">Loading…</div>
          <div class="text-[10px] text-white/35 mt-0.5" id="sidebarRole">—</div>
        </div>
        <button onclick="AuthService.logout()" title="Sign out" class="w-6 h-6 flex items-center justify-center text-white/30 hover:text-red-400 transition rounded"><i class="fa-solid fa-right-from-bracket text-xs"></i></button>
      </div>
    </div>
  </aside>
  <main class="ml-64 flex-1 overflow-y-auto flex flex-col min-h-screen">
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-200/70 px-6 py-3.5 flex items-center gap-4 sticky top-0 z-30" style="box-shadow:0 1px 0 rgba(0,0,0,.05)">
      <a href="/admin/requests.html" class="text-gray-400 hover:text-gray-600 transition text-sm flex items-center gap-1"><i class="fa-solid fa-arrow-left text-xs"></i> Back</a>
      <div class="anim-down" style="animation-delay:.04s">
        <h1 class="text-lg font-bold text-gray-900 leading-tight">Request Detail</h1>
        <div class="text-[11px] text-gray-400 font-mono" id="pageTrackingId"></div>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <div id="notifContainer"></div>
        <button onclick="previewDoc()" class="inline-flex items-center gap-2 bg-gray-600 text-white px-3.5 py-2 rounded-xl text-sm font-semibold hover:bg-gray-700 transition"><i class="fa-solid fa-eye"></i> Preview Document</button>
        <button onclick="generateDoc()" class="inline-flex items-center gap-2 bg-emerald-600 text-white px-3.5 py-2 rounded-xl text-sm font-semibold hover:bg-emerald-700 transition"><i class="fa-solid fa-file-lines"></i> Download PDF</button>
        <div class="relative" id="profileDropdown">
          <button onclick="toggleProfileDropdown()" class="flex items-center gap-2.5 rounded-xl px-2.5 py-1.5 hover:bg-gray-100 transition-all duration-150">
            <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] text-white flex items-center justify-center text-xs font-bold overflow-hidden flex-shrink-0" id="profileAvatar">?</div>
            <div class="text-left hidden sm:block">
              <div class="text-xs font-semibold text-gray-800 leading-tight" id="profileName"></div>
              <div class="text-[10px] text-gray-400" id="profileRoleTag"></div>
            </div>
            <i class="fa-solid fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200" id="profileChevron"></i>
          </button>
          <div id="profileMenu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-2xl py-2 z-50" style="box-shadow:0 16px 40px -8px rgba(0,0,0,.18);border:1px solid rgba(0,0,0,.07)">
            <div class="px-4 py-2.5 border-b border-gray-50 mb-1">
              <div class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold">Signed in as</div>
              <div class="text-xs font-semibold text-gray-800 truncate mt-0.5" id="profileMenuEmail"></div>
            </div>
            <a href="/admin/settings.html" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition admin-only"><i class="fa-solid fa-gear w-4 text-gray-400 text-xs"></i> Settings</a>
            <a href="/index.html" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition"><i class="fa-solid fa-house w-4 text-gray-400 text-xs"></i> Barangay Portal</a>
            <div class="border-t border-gray-50 my-1.5"></div>
            <button onclick="AuthService.logout()" class="w-full flex items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition"><i class="fa-solid fa-right-from-bracket w-4 text-xs"></i> Sign Out</button>
          </div>
        </div>
      </div>
    </header>
    <div class="p-6 flex-1" id="mainContent">
      <div class="space-y-5 max-w-2xl">
        <div class="skeleton h-7 rounded-xl w-1/2"></div>
        <div class="bg-white rounded-2xl border border-gray-100 p-6 space-y-4" style="box-shadow:0 1px 6px rgba(0,0,0,.05)">
          <div class="skeleton h-5 rounded w-1/3"></div>
          <div class="grid grid-cols-2 gap-3">
            <div class="skeleton h-4 rounded"></div>
            <div class="skeleton h-4 rounded"></div>
            <div class="skeleton h-4 rounded w-3/4"></div>
            <div class="skeleton h-4 rounded w-3/4"></div>
          </div>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 p-6 space-y-3" style="box-shadow:0 1px 6px rgba(0,0,0,.05)">
          <div class="skeleton h-5 rounded w-1/4"></div>
          <div class="skeleton h-4 rounded"></div>
          <div class="skeleton h-4 rounded w-11/12"></div>
          <div class="skeleton h-4 rounded w-10/12"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script>
  function toggleProfileDropdown() {
    var menu = document.getElementById('profileMenu');
    var chevron = document.getElementById('profileChevron');
    var hidden = menu.classList.contains('hidden');
    menu.classList.toggle('hidden', !hidden);
    chevron.style.transform = hidden ? 'rotate(180deg)' : '';
  }
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('profileDropdown');
    if (dd && !dd.contains(e.target)) {
      document.getElementById('profileMenu').classList.add('hidden');
      document.getElementById('profileChevron').style.transform = '';
    }
  });

  function loadPageData() { loadRequest(); }

  firebase.auth().onAuthStateChanged(async function (fbUser) {
    if (!fbUser) { localStorage.removeItem('authToken'); localStorage.removeItem('user'); window.location.href = '/admin/login.html'; return; }
    try {
      var freshToken = await fbUser.getIdToken(true);
      var idTokenResult = await fbUser.getIdTokenResult();
      var role = idTokenResult.claims.role || 'staff';
      var storedUser = JSON.parse(localStorage.getItem('user') || '{}');
      localStorage.setItem('authToken', freshToken);
      var userData = { uid: fbUser.uid, email: fbUser.email, name: fbUser.displayName || '', role: role, photoUrl: fbUser.photoURL || storedUser.photoUrl || '' };
      localStorage.setItem('user', JSON.stringify(userData));
      var initials = (userData.name || '?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?';
      var avatarHTML = userData.photoUrl ? '<img src="'+userData.photoUrl.replace(/"/g,'&quot;')+'" class="w-full h-full object-cover" alt="Profile">' : initials;
      document.getElementById('profileAvatar').innerHTML = avatarHTML;
      document.getElementById('profileName').textContent = userData.name;
      document.getElementById('profileRoleTag').textContent = cap(role);
      if (document.getElementById('profileMenuEmail')) document.getElementById('profileMenuEmail').textContent = userData.email;
      var sa = document.getElementById('sidebarAvatar');
      if (userData.photoUrl) { sa.innerHTML = '<img src="'+userData.photoUrl.replace(/"/g,'&quot;')+'" class="w-full h-full object-cover rounded-lg" alt="">'; } else { sa.textContent = initials; }
      document.getElementById('sidebarName').textContent = userData.name;
      document.getElementById('sidebarRole').textContent = cap(role);
      loadPageData();
    } catch(e) { window.location.href = '/admin/login.html'; }
  });
  function cap(str) { return str ? str.charAt(0).toUpperCase()+str.slice(1) : ''; }

  var requestId = new URLSearchParams(window.location.search).get('id');
  var currentRequest = null;

  var DOC_LABELS = {BARANGAY_CLEARANCE:'Barangay Clearance',CERTIFICATE_OF_RESIDENCY:'Certificate of Residency',CERTIFICATE_OF_INDIGENCY:'Certificate of Indigency',BUSINESS_PERMIT_ENDORSEMENT:'Business Permit Endorsement',INCIDENT_REPORT:'Incident Report'};
  var STATUS_FLOW = {PENDING:['FOR_SIGNATURE','READY_FOR_RELEASE','REJECTED'],FOR_SIGNATURE:['READY_FOR_RELEASE','REJECTED'],READY_FOR_RELEASE:['RELEASED','REJECTED'],RELEASED:[],REJECTED:[]};
  var STATUS_LABELS = {PENDING:'Pending',FOR_SIGNATURE:'For Signature',READY_FOR_RELEASE:'Ready for Release',RELEASED:'Released',REJECTED:'Rejected'};
  var STATUS_ICONS = {PENDING:'<i class="fa-solid fa-hourglass-half"></i>',FOR_SIGNATURE:'<i class="fa-solid fa-pen-nib"></i>',READY_FOR_RELEASE:'<i class="fa-solid fa-box"></i>',RELEASED:'<i class="fa-solid fa-circle-check"></i>',REJECTED:'<i class="fa-solid fa-circle-xmark"></i>'};
  var STATUS_CARD_STYLES = {
    FOR_SIGNATURE:    { bg:'#eff6ff', border:'#bfdbfe', sel:'#3b82f6', iconCls:'text-blue-500',    labelCls:'text-blue-800',    ringCls:'ring-blue-400'    },
    READY_FOR_RELEASE:{ bg:'#f5f3ff', border:'#ddd6fe', sel:'#7c3aed', iconCls:'text-violet-500',  labelCls:'text-violet-800',  ringCls:'ring-violet-400'  },
    RELEASED:         { bg:'#ecfdf5', border:'#a7f3d0', sel:'#059669', iconCls:'text-emerald-500', labelCls:'text-emerald-800', ringCls:'ring-emerald-400' },
    REJECTED:         { bg:'#fef2f2', border:'#fecaca', sel:'#dc2626', iconCls:'text-red-500',     labelCls:'text-red-800',     ringCls:'ring-red-400'     },
  };
  var STATUS_DESCS = {
    FOR_SIGNATURE:    'Forward for captain\'s signature',
    READY_FOR_RELEASE:'Document ready to be claimed',
    RELEASED:         'Resident has received the document',
    REJECTED:         'Decline and close this request',
  };

  toastr.options = { positionClass: 'toast-top-right', timeOut: 3500, progressBar: true, closeButton: true };

  function esc(s) { return !s ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function printDtsSlip() {
    if (currentRequest && currentRequest.id) window.open('/api/pdf/dts-slip/' + currentRequest.id, '_blank');
  }

  function previewDoc() {
    if (currentRequest && currentRequest.id) window.open('/admin/pdf-preview.html?id=' + currentRequest.id, '_blank');
  }

  function generateDoc() {
    if (!currentRequest || !currentRequest.id) return;
    var token = localStorage.getItem('authToken');
    fetch('/api/pdf/generate/' + currentRequest.id, {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(function(res) {
      if (!res.ok) throw new Error('Generation failed');
      return res.blob();
    }).then(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = (currentRequest.trackingId || currentRequest.id) + '_' + (currentRequest.documentType || 'DOCUMENT') + '.pdf';
      document.body.appendChild(a);
      a.click();
      setTimeout(function() { URL.revokeObjectURL(url); a.remove(); }, 2000);
      Utils.showToast('PDF downloaded', 'success');
    }).catch(function(e) {
      Utils.showToast('Download failed: ' + e.message, 'error');
    });
  }

  async function loadRequest() {
    if (!requestId) { document.getElementById('mainContent').innerHTML = '<div class="text-center py-20 text-red-400">No request ID specified.</div>'; return; }
    try {
      var data = await get('/admin/requests/' + requestId);
      currentRequest = data;
      renderRequest(data);
      document.getElementById('pageTrackingId').textContent = data.trackingId || '';
    } catch(e) {
      document.getElementById('mainContent').innerHTML = '<div class="text-center py-20 text-red-400">Failed to load request: ' + esc(e.message) + '</div>';
    }
  }

  function fitPreviewFrame() {
    var wrapper = document.getElementById('docPreviewWrapper');
    var frame = document.getElementById('docPreviewFrame');
    if (!wrapper || !frame) return;
    var scale = wrapper.offsetWidth / 794;
    frame.style.transform = 'scale(' + scale + ')';
    wrapper.style.height = Math.ceil(1123 * scale) + 'px';
  }
  window.addEventListener('resize', fitPreviewFrame);

  function renderRequest(data) {
    var name = data.residentName || ((data.firstName || '') + ' ' + (data.lastName || '')).trim();
    var statusClass = Utils.getStatusBadgeClass(data.status);
    var nextStatuses = STATUS_FLOW[data.status] || [];
    var history = (data.statusHistory || data.history || []).slice().reverse();

    document.getElementById('mainContent').innerHTML =
      '<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">' +

      // ── LEFT: main info + status ──────────────────────
      '<div class="lg:col-span-2 space-y-5">' +

      '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">' +
      '<h2 class="font-bold text-[#1e3a5f] mb-4 text-sm uppercase tracking-wide"><i class="fa-solid fa-user mr-1"></i> Resident Information</h2>' +
      '<div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-sm">' +
      infoCell('Full Name', name) +
      infoCell('Age', data.age ? data.age + ' yrs' : 'N/A') +
      infoCell('Gender', data.gender || 'N/A') +
      infoCell('Civil Status', data.civilStatus || 'N/A') +
      infoCell('Purok / Sitio', data.purok || 'N/A') +
      infoCell('Contact', data.contactNumber || 'N/A') +
      infoCell('Email', data.email || 'N/A') +
      infoCell('Birthdate', data.birthdate ? Utils.formatDate(data.birthdate) : 'N/A') +
      '</div>' +
      '</div>' +

      '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">' +
      '<h2 class="font-bold text-[#1e3a5f] mb-4 text-sm uppercase tracking-wide"><i class="fa-solid fa-clipboard-list mr-1"></i> Request Information</h2>' +
      '<div class="grid grid-cols-2 gap-4 text-sm">' +
      infoCell('Document Type', DOC_LABELS[data.documentType] || data.documentType || 'N/A') +
      infoCell('Date Submitted', Utils.formatDateTime(data.createdAt || data.submittedAt)) +
      infoCell('Walk-in', data.isWalkIn ? 'Yes' : 'No') +
      infoCell('Current Status', '<span class="px-2 py-0.5 rounded-full text-xs font-semibold ' + statusClass + '">' + (STATUS_LABELS[data.status] || data.status) + '</span>') +
      '</div>' +
      '<div class="mt-4"><div class="text-xs font-bold text-gray-400 uppercase mb-1">Purpose</div><div class="text-sm text-gray-700 bg-gray-50 rounded-xl p-3">' + esc(data.purpose) + '</div></div>' +
      '</div>' +

      (nextStatuses.length ?
      (function() {
        var cardsHtml = nextStatuses.map(function(s) {
          var cs = STATUS_CARD_STYLES[s] || { bg:'#f9fafb', border:'#e5e7eb', sel:'#1e3a5f', iconCls:'text-gray-500', labelCls:'text-gray-800', ringCls:'ring-gray-400' };
          var isReject = s === 'REJECTED';
          return '<button type="button" onclick="selectStatus(this,\'' + s + '\')"' +
            ' class="status-option-card w-full text-left rounded-2xl border-2 p-3.5 transition-all duration-150 focus:outline-none cursor-pointer"' +
            ' style="background:' + cs.bg + ';border-color:' + cs.border + '"' +
            ' data-status="' + s + '">' +
            '<div class="flex items-start gap-3">' +
            '<div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 text-base ' + cs.iconCls + '" style="background:' + cs.border + '">' + STATUS_ICONS[s] + '</div>' +
            '<div class="flex-1 min-w-0">' +
            '<div class="font-bold text-sm ' + cs.labelCls + ' leading-tight">' + STATUS_LABELS[s] + '</div>' +
            '<div class="text-[11px] text-gray-400 mt-0.5 leading-snug">' + (STATUS_DESCS[s] || '') + '</div>' +
            '</div>' +
            '<div class="status-card-check w-4 h-4 rounded-full border-2 flex-shrink-0 mt-0.5 transition-all" style="border-color:' + cs.border + '"></div>' +
            '</div>' +
            '</button>';
        }).join('');
        return '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">' +
          '<div class="flex items-center justify-between mb-5">' +
          '<h2 class="font-bold text-[#1e3a5f] text-sm uppercase tracking-wide"><i class="fa-solid fa-arrows-rotate mr-1.5"></i>Update Status</h2>' +
          '<div class="flex items-center gap-1.5">' +
          '<span class="text-[10px] text-gray-400">Now:</span>' +
          '<span class="px-2 py-0.5 rounded-full text-xs font-semibold ' + statusClass + '">' + (STATUS_LABELS[data.status] || data.status) + '</span>' +
          '</div>' +
          '</div>' +
          '<div class="grid grid-cols-1 gap-2 mb-4">' + cardsHtml + '</div>' +
          '<input type="hidden" id="newStatus" value="">' +
          '<div class="mb-3">' +
          '<label class="text-xs font-semibold text-gray-500 uppercase tracking-wide block mb-1.5">Remarks <span class="font-normal text-gray-300 normal-case">(optional)</span></label>' +
          '<textarea id="statusRemarks" rows="2" placeholder="Add a note for the resident or staff..." class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1e3a5f] resize-none text-gray-700 placeholder-gray-300"></textarea>' +
          '</div>' +
          '<button type="button" id="updateStatusBtn" onclick="updateStatus()" disabled' +
          ' class="w-full flex items-center justify-center gap-2 bg-[#1e3a5f] text-white py-2.5 rounded-xl text-sm font-bold hover:bg-blue-800 transition disabled:opacity-40 disabled:cursor-not-allowed">' +
          '<i class="fa-solid fa-circle-arrow-right text-sm"></i> Confirm Update' +
          '</button>' +
          '</div>';
      })() : '') +

      '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">' +
      '<h2 class="font-bold text-[#1e3a5f] mb-4 text-sm uppercase tracking-wide"><i class="fa-solid fa-scroll mr-1"></i> Status History</h2>' +
      (history.length ? history.map(function(entry, i) {
        var s = entry.status || '';
        var bc = Utils.getStatusBadgeClass(s);
        return '<div class="flex gap-3 ' + (i > 0 ? 'opacity-70' : '') + '">' +
          '<div class="flex flex-col items-center">' +
          '<div class="w-7 h-7 rounded-full flex items-center justify-center text-xs ' + (i === 0 ? 'bg-[#1e3a5f] text-white' : 'bg-gray-100 text-gray-500') + '">' + (STATUS_ICONS[s] || '•') + '</div>' +
          (i < history.length - 1 ? '<div class="w-0.5 flex-1 bg-gray-100 mt-1"></div>' : '') +
          '</div>' +
          '<div class="pb-4 flex-1">' +
          '<span class="px-2 py-0.5 rounded-full text-xs font-semibold ' + bc + '">' + (STATUS_LABELS[s] || s) + '</span>' +
          '<div class="text-xs text-gray-400 mt-1">' + Utils.formatDateTime(entry.timestamp || entry.createdAt) + '</div>' +
          (entry.staffName ? '<div class="text-xs text-gray-500">By: ' + esc(entry.staffName) + '</div>' : '') +
          (entry.remarks ? '<div class="text-xs text-gray-600 bg-gray-50 rounded-lg px-2 py-1 mt-1">' + esc(entry.remarks) + '</div>' : '') +
          '</div>' +
          '</div>';
      }).join('') : '<div class="text-xs text-gray-400">No history yet.</div>') +
      '</div>' +

      '</div>' + // end left col-span-2

      // ── RIGHT: document preview panel ─────────────────
      '<div class="space-y-5">' +
      '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 sticky top-24">' +
      '<h2 class="font-bold text-[#1e3a5f] mb-3 text-sm uppercase tracking-wide flex items-center gap-2"><i class="fa-solid fa-file-lines"></i> Document Preview</h2>' +
      '<div id="docPreviewWrapper" class="overflow-hidden rounded-xl border border-gray-100 bg-gray-50">' +
      '<iframe id="docPreviewFrame" src="/admin/pdf-preview.html?id=' + esc(String(data.id || '')) + '&embed=1"' +
      ' style="width:794px;height:1123px;border:none;transform-origin:top left;display:block;" onload="fitPreviewFrame()"></iframe>' +
      '</div>' +
      '<div class="mt-3 flex gap-2">' +
      '<button onclick="previewDoc()" class="flex-1 inline-flex items-center justify-center gap-1.5 bg-gray-100 text-gray-700 px-3 py-2 rounded-xl text-xs font-semibold hover:bg-gray-200 transition"><i class="fa-solid fa-up-right-from-square text-[10px]"></i> Open Full</button>' +
      '<button onclick="generateDoc()" class="flex-1 inline-flex items-center justify-center gap-1.5 bg-emerald-600 text-white px-3 py-2 rounded-xl text-xs font-semibold hover:bg-emerald-700 transition"><i class="fa-solid fa-download text-[10px]"></i> Download</button>' +
      '</div>' +
      '</div>' +
      '</div>' + // end right

      '</div>';

    fitPreviewFrame();
  }

  function infoCell(label, value) {
    return '<div><div class="text-xs font-bold text-gray-400 uppercase mb-0.5">' + label + '</div><div class="font-medium text-gray-800">' + (typeof value === 'string' && value.startsWith('<') ? value : esc(value)) + '</div></div>';
  }

  function selectStatus(el, val) {
    document.querySelectorAll('.status-option-card').forEach(function(c) {
      var s = c.dataset.status;
      var cs = STATUS_CARD_STYLES[s] || {};
      c.style.borderColor = cs.border || '#e5e7eb';
      c.style.boxShadow = '';
      var chk = c.querySelector('.status-card-check');
      if (chk) { chk.style.background = ''; chk.style.borderColor = cs.border || '#e5e7eb'; chk.innerHTML = ''; }
      c.setAttribute('aria-selected', 'false');
    });
    var cs = STATUS_CARD_STYLES[val] || {};
    el.style.borderColor = cs.sel || '#1e3a5f';
    el.style.boxShadow = '0 0 0 3px ' + (cs.sel || '#1e3a5f') + '22';
    var chk = el.querySelector('.status-card-check');
    if (chk) { chk.style.background = cs.sel || '#1e3a5f'; chk.style.borderColor = cs.sel || '#1e3a5f'; chk.innerHTML = '<svg viewBox="0 0 10 8" fill="none" style="width:9px;height:9px;display:block;margin:auto"><path d="M1 3.5L3.8 6.5L9 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }
    el.setAttribute('aria-selected', 'true');
    document.getElementById('newStatus').value = val;
    var btn = document.getElementById('updateStatusBtn');
    btn.disabled = false;
  }

  async function updateStatus() {
    var newStatus = document.getElementById('newStatus').value;
    var remarks = document.getElementById('statusRemarks').value;
    if (!newStatus) return;
    var btn = document.getElementById('updateStatusBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-sm"></i> Updating…';
    try {
      await patch('/admin/requests/' + requestId + '/status', {newStatus: newStatus, remarks: remarks});
      toastr.success('Status updated to <strong>' + STATUS_LABELS[newStatus] + '</strong>', 'Status Updated');
      setTimeout(function() { loadRequest(); }, 1200);
    } catch(err) {
      toastr.error('Failed to update status: ' + err.message, 'Update Failed');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-circle-arrow-right text-sm"></i> Confirm Update';
    }
  }

</script>
</body>
</html>
