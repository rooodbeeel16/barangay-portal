<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/logo/sirangan-bg.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — Barangay Sirangan Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/shared.css">
  <link rel="stylesheet" href="/assets/admin.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <style>
    /* Page-specific overrides — shared styles in admin.css */
    #annDrawer { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    #drawerBackdrop { transition: opacity 0.3s ease; }
  </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
  <aside class="w-64 bg-[#0b1929] text-white flex flex-col flex-shrink-0 fixed h-full z-40" style="box-shadow:4px 0 24px rgba(0,0,0,.18)">
    <div class="px-5 py-5 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="relative flex-shrink-0">
          <img src="/assets/logo/sirangan-bg.png" alt="Logo" class="w-9 h-9 rounded-xl object-cover" style="box-shadow:0 0 0 2px rgba(251,191,36,.35)">
          <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-400 rounded-full border-2 border-[#0b1929] pulse-dot"></span>
        </div>
        <div>
          <div class="font-bold text-sm text-white leading-tight">Brgy. Sirangan</div>
          <div class="text-[10px] text-blue-300/70 font-medium tracking-wide uppercase mt-0.5">Admin Portal</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
      <p class="px-3 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">Main</p>
      <a href="/admin/dashboard.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span> Dashboard</a>
      <a href="/admin/requests.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-clipboard-list"></i></span> Requests</a>
      <a href="/admin/residents.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Residents</a>
      <a href="/admin/announcements.html" class="nav-link active"><span class="nav-icon"><i class="fa-solid fa-bullhorn"></i></span> Announcements</a>
      <a href="/admin/appointments.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-calendar-days"></i></span> Appointments</a>
      <a href="/admin/blotter.html" class="nav-link"><span class="nav-icon"><i class="fa-solid fa-book"></i></span> Blotter</a>
      <p class="px-3 pt-4 pb-1.5 text-[9px] font-bold text-white/25 uppercase tracking-[.12em]">System</p>
      <a href="/admin/audit-logs.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-pen-to-square"></i></span> Audit Logs</a>
      <a href="/admin/settings.html" class="nav-link admin-only"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span> Settings</a>
    </nav>
    <div class="px-4 py-3.5 border-t border-white/10">
      <div class="flex items-center gap-2.5 px-1">
        <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] flex items-center justify-center text-xs font-bold text-white overflow-hidden flex-shrink-0" id="sidebarAvatar">?</div>
        <div class="min-w-0 flex-1">
          <div class="text-xs font-semibold text-white truncate" id="sidebarName">Loading…</div>
          <div class="text-[10px] text-white/35 mt-0.5" id="sidebarRole">—</div>
        </div>
        <button onclick="AuthService.logout()" title="Sign out" class="w-6 h-6 flex items-center justify-center text-white/30 hover:text-red-400 transition rounded"><i class="fa-solid fa-right-from-bracket text-xs"></i></button>
      </div>
    </div>
  </aside>
  <main class="ml-64 flex-1 overflow-y-auto flex flex-col min-h-screen">
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-200/70 px-6 py-3.5 flex justify-between items-center sticky top-0 z-30" style="box-shadow:0 1px 0 rgba(0,0,0,.05)">
      <div class="anim-down" style="animation-delay:.04s">
        <h1 class="text-lg font-bold text-gray-900 leading-tight">Announcements</h1>
        <p class="text-[11px] text-gray-400 font-medium mt-0.5">Manage public announcements for Barangay Sirangan</p>
      </div>
      <div class="flex items-center gap-2">
        <div id="notifContainer"></div>
        <button onclick="openModal()" class="inline-flex items-center gap-2 bg-[#1e3a5f] text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-blue-800 transition"><i class="fa-solid fa-plus"></i> New Announcement</button>
        <div class="relative" id="profileDropdown">
          <button onclick="toggleProfileDropdown()" class="flex items-center gap-2.5 rounded-xl px-2.5 py-1.5 hover:bg-gray-100 transition-all duration-150">
            <div class="w-8 h-8 rounded-lg bg-[#1e3a5f] text-white flex items-center justify-center text-xs font-bold overflow-hidden flex-shrink-0" id="profileAvatar">?</div>
            <div class="text-left hidden sm:block">
              <div class="text-xs font-semibold text-gray-800 leading-tight" id="profileName"></div>
              <div class="text-[10px] text-gray-400" id="profileRoleTag"></div>
            </div>
            <i class="fa-solid fa-chevron-down text-[10px] text-gray-400 transition-transform duration-200" id="profileChevron"></i>
          </button>
          <div id="profileMenu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-2xl py-2 z-50" style="box-shadow:0 16px 40px -8px rgba(0,0,0,.18);border:1px solid rgba(0,0,0,.07)">
            <div class="px-4 py-2.5 border-b border-gray-50 mb-1">
              <div class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold">Signed in as</div>
              <div class="text-xs font-semibold text-gray-800 truncate mt-0.5" id="profileMenuEmail"></div>
            </div>
            <a href="/admin/settings.html" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition admin-only"><i class="fa-solid fa-gear w-4 text-gray-400 text-xs"></i> Settings</a>
            <a href="/index.html" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2.5 mx-1.5 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg transition"><i class="fa-solid fa-house w-4 text-gray-400 text-xs"></i> Barangay Portal</a>
            <div class="border-t border-gray-50 my-1.5"></div>
            <button onclick="AuthService.logout()" class="w-full flex items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition"><i class="fa-solid fa-right-from-bracket w-4 text-xs"></i> Sign Out</button>
          </div>
        </div>
      </div>
    </header>
    <div class="p-6 space-y-5 flex-1">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
              <tr>
                <th class="px-4 py-3 text-left">Title</th>
                <th class="px-4 py-3 text-left">Category</th>
                <th class="px-4 py-3 text-left">Status</th>
                <th class="px-4 py-3 text-left">Date</th>
                <th class="px-4 py-3 text-left">Actions</th>
              </tr>
            </thead>
            <tbody id="annTable">
              <tr><td colspan="5" class="px-5 py-4">
                <div class="space-y-2.5">
                  <div class="skeleton h-4 rounded"></div>
                  <div class="skeleton h-4 rounded w-11/12"></div>
                  <div class="skeleton h-4 rounded"></div>
                  <div class="skeleton h-4 rounded w-10/12"></div>
                  <div class="skeleton h-4 rounded w-11/12"></div>
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Drawer Backdrop -->
<div id="drawerBackdrop" class="hidden fixed inset-0 bg-black/40 z-40" onclick="closeModal()"></div>

<!-- Right-side Sliding Drawer -->
<div id="annDrawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-50 flex flex-col translate-x-full">
  <!-- Drawer Header -->
  <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-gradient-to-r from-[#0f2044] to-[#1d4ed8]">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-bullhorn text-white/80 text-sm"></i>
      <h2 class="font-bold text-white text-base" id="modalTitle">New Announcement</h2>
    </div>
    <button onclick="closeModal()" class="text-white/70 hover:text-white transition text-lg w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/10">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <!-- Drawer Body -->
  <div class="flex-1 overflow-y-auto px-6 py-6">
    <input type="hidden" id="editId">
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Title <span class="text-red-500">*</span></label>
        <input type="text" id="annTitle" required placeholder="Announcement title..." class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1e3a5f] focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Content <span class="text-red-500">*</span></label>
        <textarea id="annContent" rows="6" required placeholder="Write the announcement content here..." class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1e3a5f] focus:border-transparent resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Category</label>
        <select id="annCategory" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1e3a5f] focus:border-transparent">
          <option value="General">General</option>
          <option value="Health">Health</option>
          <option value="Safety">Safety</option>
          <option value="Event">Event</option>
          <option value="Advisory">Advisory</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Visibility</label>
        <select id="annPublished" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1e3a5f] focus:border-transparent">
          <option value="true">Published — Visible to Public</option>
          <option value="false">Draft — Hidden from Public</option>
        </select>
      </div>
      <div id="modalError" class="hidden text-red-500 text-xs bg-red-50 border border-red-100 rounded-lg px-3 py-2"></div>
    </div>
  </div>
  <!-- Drawer Footer -->
  <div class="px-6 py-4 border-t border-gray-100 flex gap-3">
    <button onclick="closeModal()" class="flex-1 border border-gray-300 text-gray-700 px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-50 transition">Cancel</button>
    <button onclick="saveAnnouncement()" id="saveBtn" class="flex-1 text-white px-6 py-2.5 rounded-xl text-sm font-bold transition" style="background:linear-gradient(135deg,#0f2044,#1d4ed8)">Save Announcement</button>
  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script>
  function toggleProfileDropdown() {
    var menu = document.getElementById('profileMenu');
    var chevron = document.getElementById('profileChevron');
    var hidden = menu.classList.contains('hidden');
    menu.classList.toggle('hidden', !hidden);
    chevron.style.transform = hidden ? 'rotate(180deg)' : '';
  }
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('profileDropdown');
    if (dd && !dd.contains(e.target)) {
      document.getElementById('profileMenu').classList.add('hidden');
      document.getElementById('profileChevron').style.transform = '';
    }
  });

  function loadPageData() { loadAnnouncements(); }

  firebase.auth().onAuthStateChanged(async function (fbUser) {
    if (!fbUser) { localStorage.removeItem('authToken'); localStorage.removeItem('user'); window.location.href = '/admin/login.html'; return; }
    try {
      var freshToken = await fbUser.getIdToken(true);
      var idTokenResult = await fbUser.getIdTokenResult();
      var role = idTokenResult.claims.role || 'staff';
      var storedUser = JSON.parse(localStorage.getItem('user') || '{}');
      localStorage.setItem('authToken', freshToken);
      var userData = { uid: fbUser.uid, email: fbUser.email, name: fbUser.displayName || '', role: role, photoUrl: fbUser.photoURL || storedUser.photoUrl || '' };
      localStorage.setItem('user', JSON.stringify(userData));
      var initials = (userData.name || '?').split(/\s+/).map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase()||'?';
      var avatarHTML = userData.photoUrl ? '<img src="'+userData.photoUrl.replace(/"/g,'&quot;')+'" class="w-full h-full object-cover" alt="Profile">' : initials;
      document.getElementById('profileAvatar').innerHTML = avatarHTML;
      document.getElementById('profileName').textContent = userData.name;
      document.getElementById('profileRoleTag').textContent = cap(role);
      if (document.getElementById('profileMenuEmail')) document.getElementById('profileMenuEmail').textContent = userData.email;
      var sa = document.getElementById('sidebarAvatar');
      if (userData.photoUrl) { sa.innerHTML = '<img src="'+userData.photoUrl.replace(/"/g,'&quot;')+'" class="w-full h-full object-cover rounded-lg" alt="">'; } else { sa.textContent = initials; }
      document.getElementById('sidebarName').textContent = userData.name;
      document.getElementById('sidebarRole').textContent = cap(role);
      loadPageData();
    } catch(e) { window.location.href = '/admin/login.html'; }
  });
  function cap(str) { return str ? str.charAt(0).toUpperCase()+str.slice(1) : ''; }

  var CAT_COLORS = {General:'bg-blue-100 text-blue-700',Health:'bg-green-100 text-green-700',Safety:'bg-red-100 text-red-700',Event:'bg-purple-100 text-purple-700',Advisory:'bg-yellow-100 text-yellow-700'};

  function esc(s) { return !s ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function loadAnnouncements() {
    try {
      var data = await get('/announcements/all');
      var items = Array.isArray(data) ? data : (data.announcements || data.data || []);
      if (!items.length) {
        document.getElementById('annTable').innerHTML = '<tr><td colspan="5" class="text-center py-10 text-gray-400">No announcements yet. Create one!</td></tr>';
        return;
      }
      document.getElementById('annTable').innerHTML = items.map(function(a) {
        var id = a.id || a._id || '';
        var cat = a.category || 'General';
        var catClass = CAT_COLORS[cat] || 'bg-gray-100 text-gray-600';
        return '<tr class="border-t border-gray-50 hover:bg-gray-50 transition">' +
          '<td class="px-4 py-3"><div class="font-medium text-gray-800 text-xs">' + esc(a.title) + '</div><div class="text-gray-400 text-xs mt-0.5 line-clamp-1 max-w-xs">' + esc(a.content || '') + '</div></td>' +
          '<td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ' + catClass + '">' + cat + '</span></td>' +
          '<td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ' + (a.isPublished || a.published ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500') + '">' + (a.isPublished || a.published ? '✓ Published' : 'Draft') + '</span></td>' +
          '<td class="px-4 py-3 text-xs text-gray-500">' + Utils.formatDate(a.createdAt || a.date) + '</td>' +
          '<td class="px-4 py-3 flex gap-2">' +
          (id ? '<button onclick="editAnnouncement(' + JSON.stringify(a).replace(/"/g,"'") + ')" class="text-xs bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1.5 rounded-lg transition">Edit</button>' : '') +
          (id ? '<button onclick="deleteAnnouncement(\'' + id + '\')" class="text-xs bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg transition">Delete</button>' : '') +
          '</td></tr>';
      }).join('');
    } catch(e) {
      document.getElementById('annTable').innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-400">Failed to load announcements.</td></tr>';
    }
  }

  function openModal(data) {
    var backdrop = document.getElementById('drawerBackdrop');
    var drawer = document.getElementById('annDrawer');
    document.getElementById('modalError').classList.add('hidden');
    if (data) {
      document.getElementById('modalTitle').textContent = 'Edit Announcement';
      document.getElementById('editId').value = data.id || data._id || '';
      document.getElementById('annTitle').value = data.title || '';
      document.getElementById('annContent').value = data.content || '';
      document.getElementById('annCategory').value = data.category || 'General';
      document.getElementById('annPublished').value = (data.isPublished || data.published) ? 'true' : 'false';
    } else {
      document.getElementById('modalTitle').textContent = 'New Announcement';
      document.getElementById('editId').value = '';
      document.getElementById('annTitle').value = '';
      document.getElementById('annContent').value = '';
      document.getElementById('annCategory').value = 'General';
      document.getElementById('annPublished').value = 'true';
    }
    backdrop.classList.remove('hidden');
    backdrop.style.opacity = '0';
    drawer.style.transform = 'translateX(100%)';
    requestAnimationFrame(function() {
      backdrop.style.opacity = '1';
      drawer.style.transform = 'translateX(0)';
    });
    document.body.style.overflow = 'hidden';
  }

  function editAnnouncement(data) { openModal(data); }

  function closeModal() {
    var backdrop = document.getElementById('drawerBackdrop');
    var drawer = document.getElementById('annDrawer');
    backdrop.style.opacity = '0';
    drawer.style.transform = 'translateX(100%)';
    setTimeout(function() {
      backdrop.classList.add('hidden');
      document.body.style.overflow = '';
    }, 300);
  }

  async function saveAnnouncement() {
    var title = document.getElementById('annTitle').value.trim();
    var content = document.getElementById('annContent').value.trim();
    if (!title || !content) {
      document.getElementById('modalError').textContent = 'Title and content are required.';
      document.getElementById('modalError').classList.remove('hidden'); return;
    }
    var payload = {
      title: title, content: content,
      category: document.getElementById('annCategory').value,
      published: document.getElementById('annPublished').value === 'true'
    };
    var editId = document.getElementById('editId').value;
    var btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      if (editId) { await put('/announcements/' + editId, payload); Utils.showToast('Announcement updated', 'success'); }
      else { await post('/announcements', payload); Utils.showToast('Announcement created', 'success'); }
      closeModal();
      loadAnnouncements();
    } catch(e) {
      document.getElementById('modalError').textContent = 'Failed: ' + e.message;
      document.getElementById('modalError').classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.textContent = 'Save';
    }
  }

  async function deleteAnnouncement(id) {
    if (!confirm('Are you sure you want to delete this announcement?')) return;
    try {
      await del('/announcements/' + id);
      Utils.showToast('Announcement deleted', 'success');
      loadAnnouncements();
    } catch(e) {
      Utils.showToast('Failed: ' + e.message, 'error');
    }
  }

</script>
</body>
</html>
